<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>RB Healthcare — Task Portal</title>
<style>
  :root {
    --page:           #f9f9f7;
    --surface:        #fcfcfb;
    --ink:            #0b0b0b;
    --ink-2:          #52514e;
    --muted:          #898781;
    --grid:           #e1e0d9;
    --baseline:       #c3c2b7;
    --ring:           rgba(11,11,11,0.10);
    --series-1:       #2a78d6;  /* Rishi WORK */
    --series-2:       #1baf7a;  /* Mission Control */
    --series-none:    #898781;  /* No project */
    --critical:       #d03b3b;  /* overdue */
    --warning:        #fab219;  /* due today */
    --good-text:      #006300;
    --chip-on:        #0b0b0b;
    --chip-on-ink:    #fcfcfb;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --page:         #0d0d0d;
      --surface:      #1a1a19;
      --ink:          #ffffff;
      --ink-2:        #c3c2b7;
      --muted:        #898781;
      --grid:         #2c2c2a;
      --baseline:     #383835;
      --ring:         rgba(255,255,255,0.10);
      --series-1:     #3987e5;
      --series-2:     #199e70;
      --critical:     #d03b3b;
      --warning:      #fab219;
      --good-text:    #0ca30c;
      --chip-on:      #ffffff;
      --chip-on-ink:  #0d0d0d;
    }
  }
  :root[data-theme="light"] {
    --page:#f9f9f7; --surface:#fcfcfb; --ink:#0b0b0b; --ink-2:#52514e; --muted:#898781;
    --grid:#e1e0d9; --baseline:#c3c2b7; --ring:rgba(11,11,11,0.10);
    --series-1:#2a78d6; --series-2:#1baf7a; --series-none:#898781;
    --critical:#d03b3b; --warning:#fab219; --good-text:#006300;
    --chip-on:#0b0b0b; --chip-on-ink:#fcfcfb;
  }
  :root[data-theme="dark"] {
    --page:#0d0d0d; --surface:#1a1a19; --ink:#ffffff; --ink-2:#c3c2b7; --muted:#898781;
    --grid:#2c2c2a; --baseline:#383835; --ring:rgba(255,255,255,0.10);
    --series-1:#3987e5; --series-2:#199e70; --series-none:#898781;
    --critical:#d03b3b; --warning:#fab219; --good-text:#0ca30c;
    --chip-on:#ffffff; --chip-on-ink:#0d0d0d;
  }

  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 24px 16px 64px;
    background: var(--page); color: var(--ink);
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    font-size: 15px; line-height: 1.45;
  }
  .wrap { max-width: 880px; margin: 0 auto; }

  header h1 { font-size: 1.35rem; margin: 0 0 2px; }
  .meta { color: var(--muted); font-size: 0.82rem; margin-bottom: 20px; }
  .meta .src-live { color: var(--good-text); font-weight: 600; }
  .meta .src-snap { color: var(--ink-2); font-weight: 600; }

  .tiles { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .tile {
    background: var(--surface); border: 1px solid var(--ring); border-radius: 12px;
    padding: 14px 16px; cursor: pointer; text-align: left; font: inherit; color: inherit;
  }
  .tile:hover { border-color: var(--baseline); }
  .tile[aria-pressed="true"] { outline: 2px solid var(--ink); outline-offset: -2px; }
  .tile .v { font-size: 1.9rem; font-weight: 700; line-height: 1.1; }
  .tile .l { color: var(--ink-2); font-size: 0.82rem; margin-top: 2px; }
  .tile.crit .v { color: var(--critical); }

  .controls { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-bottom: 16px; }
  .controls input[type="search"] {
    flex: 1 1 180px; padding: 8px 12px; border: 1px solid var(--baseline);
    border-radius: 8px; background: var(--surface); color: var(--ink); font: inherit;
  }
  .controls select {
    padding: 8px 10px; border: 1px solid var(--baseline); border-radius: 8px;
    background: var(--surface); color: var(--ink); font: inherit;
  }

  .byproj {
    background: var(--surface); border: 1px solid var(--ring); border-radius: 12px;
    padding: 14px 16px; margin-bottom: 20px;
  }
  .byproj h2 { font-size: 0.88rem; margin: 0 0 10px; color: var(--ink-2); font-weight: 600; }
  .bp-row { display: grid; grid-template-columns: 132px 1fr 2.5em; gap: 10px; align-items: center; margin: 6px 0; }
  .bp-name { font-size: 0.85rem; color: var(--ink-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bp-track { position: relative; height: 14px; }
  .bp-bar { position: absolute; inset: 0 auto 0 0; border-radius: 0 4px 4px 0; min-width: 2px; }
  .bp-count { font-size: 0.85rem; font-variant-numeric: tabular-nums; text-align: right; }

  .group h2 {
    font-size: 0.82rem; text-transform: uppercase; letter-spacing: 0.04em;
    color: var(--muted); margin: 22px 0 8px; font-weight: 600;
    display: flex; align-items: center; gap: 8px;
  }
  .group h2::after { content: ""; flex: 1; border-top: 1px solid var(--grid); }
  .group.overdue h2 { color: var(--critical); }

  ul.tasks { list-style: none; margin: 0; padding: 0; }
  ul.tasks li {
    background: var(--surface); border: 1px solid var(--ring); border-radius: 10px;
    padding: 10px 14px; margin-bottom: 8px;
    display: flex; flex-wrap: wrap; gap: 4px 12px; align-items: baseline;
  }
  ul.tasks li:hover { border-color: var(--baseline); }
  .t-name { flex: 1 1 60%; }
  .t-name a { color: var(--ink); text-decoration: none; }
  .t-name a:hover { text-decoration: underline; }
  .t-proj { font-size: 0.78rem; color: var(--ink-2); white-space: nowrap; }
  .t-proj .dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; margin-right: 5px; vertical-align: baseline; }
  .t-due { font-size: 0.82rem; color: var(--ink-2); white-space: nowrap; font-variant-numeric: tabular-nums; }
  .t-due.crit { color: var(--critical); font-weight: 600; }
  .t-due.today { color: var(--ink); font-weight: 600; }
  .t-due.crit::before { content: "⚠ "; }
  .empty { color: var(--muted); padding: 24px 0; text-align: center; }

  footer { margin-top: 32px; color: var(--muted); font-size: 0.78rem; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>RB Healthcare — Task Portal</h1>
    <div class="meta" id="meta">Loading…</div>
  </header>

  </div>

  <main id="list"></main>

  <footer>
    Data: <code>data/tasks.json</code>, refreshed daily from Asana.
    Task links open in Asana.

var SOURCES = [
  "data/tasks.json",
  "https://raw.githubusercontent.com/rishi235/rbh-site-data/claude/composio-asana-exploration-5xood7/data/tasks.json",
  "https://cdn.jsdelivr.net/gh/rishi235/rbh-site-data@main/data/tasks.json"
];

var PROJECT_COLORS = { "Rishi WORK": "--series-1", "Mission Control": "--series-2" };
var NO_PROJECT = "No project";

var state = { feed: null, source: "", filter: "all", q: "", proj: "" };

function fetchWithTimeout(url, ms) {
  return Promise.race([
    fetch(url, { cache: "no-store" }).then(function (r) {
      if (!r.ok) throw new Error("HTTP " + r.status);
      return r.json();
    }),
    new Promise(function (_, rej) { setTimeout(function () { rej(new Error("timeout")); }, ms); })
  ]);
}

function loadFeed(i) {
  i = i || 0;
  if (i >= SOURCES.length) {
    state.feed = SNAPSHOT; state.source = "snapshot"; render();
    return;
  }
  fetchWithTimeout(SOURCES[i], 6000).then(function (json) {
    if (!json || !Array.isArray(json.tasks)) throw new Error("bad schema");
    state.feed = json; state.source = "live"; render();
  }).catch(function () { loadFeed(i + 1); });
}

function today() { var d = new Date(); return new Date(d.getFullYear(), d.getMonth(), d.getDate()); }
function parseDue(s) { if (!s) return null; var p = s.split("-").map(Number); return new Date(p[0], p[1] - 1, p[2]); }
function dayDiff(due) { return Math.round((due - today()) / 86400000); }

function bucket(t) {
  var due = parseDue(t.due_on);
  if (!due) return "none";
  var d = dayDiff(due);
  if (d < 0) return "overdue";
  if (d === 0) return "today";
  if (d <= 7) return "week";
  return "later";
}

function dueLabel(t) {
  var due = parseDue(t.due_on);
  if (!due) return "no due date";
  var d = dayDiff(due);
  var nice = due.toLocaleDateString("en-GB", { day: "numeric", month: "short" });
  if (d < 0) return nice + " · " + (-d) + (d === -1 ? " day" : " days") + " overdue";
  if (d === 0) return "due today";
  if (d === 1) return "due tomorrow";
  if (d <= 7) return nice + " · in " + d + " days";
  return nice;
}

function projName(t) { return (t.projects && t.projects.length) ? t.projects[0] : NO_PROJECT; }
function projColor(name) {
  return "var(" + (PROJECT_COLORS[name] || "--series-none") + ")";
}

function esc(s) {
  return String(s == null ? "" : s).replace(/&/g, "&amp;").replace(/</g, "&lt;")
    .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

function visibleTasks() {
  return state.feed.tasks.filter(function (t) {
    var b = bucket(t);
    if (state.filter === "overdue" && b !== "overdue") return false;
    if (state.filter === "week" && !(b === "today" || b === "week" || b === "overdue")) return false;
    if (state.filter === "none" && b !== "none") return false;
    if (state.proj && projName(t) !== state.proj) return false;
    if (state.q && t.name.toLowerCase().indexOf(state.q) === -1) return false;
    return true;
  });
}

function render() {
  var f = state.feed, all = f.tasks;
  var counts = { total: all.length, overdue: 0, week: 0, none: 0 };
  all.forEach(function (t) {
    var b = bucket(t);
    if (b === "overdue") counts.overdue++;
    if (b === "today" || b === "week") counts.week++;
    if (b === "none") counts.none++;
  });

  document.getElementById("meta").innerHTML =
    (state.source === "live"
      ? '<span class="src-live">● live</span>'
      : '<span class="src-snap">○ snapshot</span>') +
    " · feed generated " + esc(f.generated_at ? f.generated_at.replace("T", " ").replace("Z", " UTC") : "?") +
    " · " + esc(f.assignee || "");

  var tiles = [
    { k: "all", v: counts.total, l: "Open tasks" },
    { k: "overdue", v: counts.overdue, l: "Overdue", crit: counts.overdue > 0 },
    { k: "week", v: counts.week, l: "Due next 7 days" },
    { k: "none", v: counts.none, l: "No due date" }
  ];
  document.getElementById("tiles").innerHTML = tiles.map(function (t) {
    return '<button class="tile' + (t.crit ? " crit" : "") + '" data-k="' + t.k +
      '" aria-pressed="' + (state.filter === t.k) + '"><div class="v">' + t.v +
      '</div><div class="l">' + t.l + "</div></button>";
  }).join("");
  Array.prototype.forEach.call(document.querySelectorAll(".tile"), function (b) {
    b.addEventListener("click", function () {
      state.filter = (state.filter === b.dataset.k) ? "all" : b.dataset.k;
      render();
    });
  });

  // project select (preserve selection)
  var names = [];
  all.forEach(function (t) { var n = projName(t); if (names.indexOf(n) === -1) names.push(n); });
  var sel = document.getElementById("proj");
  sel.innerHTML = '<option value="">All projects</option>' + names.map(function (n) {
    return '<option' + (state.proj === n ? " selected" : "") + ">" + esc(n) + "</option>";
  }).join("");

  // by-project bar (direct-labeled)
  var bp = names.map(function (n) {
    return { n: n, c: all.filter(function (t) { return projName(t) === n; }).length };
  }).sort(function (a, b) { return b.c - a.c; });
  var max = bp.length ? bp[0].c : 0;
  document.getElementById("byproj").hidden = bp.length < 2;
  document.getElementById("bp-rows").innerHTML = bp.map(function (r) {
    var w = max ? Math.max(2, Math.round(r.c / max * 100)) : 0;
    return '<div class="bp-row" title="' + esc(r.n) + ": " + r.c + ' open">' +
      '<div class="bp-name">' + esc(r.n) + "</div>" +
      '<div class="bp-track"><div class="bp-bar" style="width:' + w + "%;background:" + projColor(r.n) + '"></div></div>' +
      '<div class="bp-count">' + r.c + "</div></div>";
  }).join("");

  // grouped list
  var order = [
    ["overdue", "Overdue"], ["today", "Due today"], ["week", "Due this week"],
    ["later", "Later"], ["none", "No due date"]
  ];
  var vis = visibleTasks();
  var html = order.map(function (g) {
    var items = vis.filter(function (t) { return bucket(t) === g[0]; });
    if (!items.length) return "";
    return '<section class="group ' + g[0] + '"><h2>' + g[1] + " · " + items.length + "</h2><ul class=\"tasks\">" +
      items.map(function (t) {
        var b = bucket(t), n = projName(t);
        return "<li><span class=\"t-name\"><a href=\"" + esc(t.url) + '" target="_blank" rel="noopener">' +
          esc(t.name) + "</a></span>" +
          '<span class="t-proj"><span class="dot" style="background:' + projColor(n) + '"></span>' + esc(n) + "</span>" +
          '<span class="t-due' + (b === "overdue" ? " crit" : b === "today" ? " today" : "") + '">' +
          esc(dueLabel(t)) + "</span></li>";
      }).join("") + "</ul></section>";
  }).join("");
  document.getElementById("list").innerHTML = html || '<div class="empty">No tasks match the current filters.</div>';
}

document.getElementById("q").addEventListener("input", function (e) {
  state.q = e.target.value.trim().toLowerCase(); render();
});
document.getElementById("proj").addEventListener("change", function (e) {
  state.proj = e.target.value; render();
});

loadFeed();
</script>
</body>
</html>
